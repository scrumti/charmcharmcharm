<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키링아카이브</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #05060c;
  --text: #ddd8d0;
  --dim: #555;
  --deep-sea-accent: #00d4aa;
  --forest-accent: #6baed6;
  --cosmos-accent: #c8d8e8;
}

html, body {
  width: 100%; height: 100vh;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
}

.page {
  position: fixed;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.7s ease;
}
.page.active {
  opacity: 1;
  pointer-events: all;
}

/* ─── NAV ─── */
.nav {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 28px 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 200;
}
.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  letter-spacing: 0.4em;
  color: #444;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.2s;
}
.nav-logo:hover { color: #888; }
.nav-links { display: flex; gap: 36px; }
.nav-link {
  font-size: 10px;
  letter-spacing: 0.25em;
  color: #444;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.2s;
}
.nav-link:hover, .nav-link.on { color: #bbb; }

/* ═══════════════════════════════════
   ENTRY PAGE
═══════════════════════════════════ */
#entry {
  background: radial-gradient(ellipse at 50% 60%, #0a0d18 0%, #03040a 70%);
  overflow: hidden;
}
.entry-hint {
  position: absolute;
  bottom: 36px;
  width: 100%;
  text-align: center;
  font-size: 9px;
  letter-spacing: 0.35em;
  color: #333;
  text-transform: uppercase;
  animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{opacity:0.3} 50%{opacity:0.9} }

.floating-field { position: absolute; inset: 0; }

.kr-card {
  position: absolute;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  transition: filter 0.3s ease;
  will-change: transform;
}
.kr-card:hover { filter: brightness(1.6); z-index: 50; }
.kr-card:hover .kr-orb { transform: scale(1.18); }

.kr-orb {
  width: 74px; height: 74px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px;
  position: relative;
  transition: transform 0.3s ease;
  flex-shrink: 0;
}
.kr-orb::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  box-shadow: inset 0 0 20px rgba(255,255,255,0.06);
}
.kr-name {
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #444;
  white-space: nowrap;
  transition: color 0.3s;
}
.kr-card:hover .kr-name { color: #888; }

.world-deep-sea .kr-orb {
  background: radial-gradient(circle at 38% 35%, #00ffcc18, #003d30);
  box-shadow: 0 0 24px #00d4aa30, 0 0 60px #00d4aa10;
  border: 1px solid #00d4aa22;
}
.world-forest .kr-orb {
  background: radial-gradient(circle at 38% 35%, #6baed620, #050f1a);
  box-shadow: 0 0 24px #6baed630, 0 0 60px #6baed610;
  border: 1px solid #6baed622;
}
.world-cosmos .kr-orb {
  background: radial-gradient(circle at 38% 35%, #c8d8e820, #0c0f1e);
  box-shadow: 0 0 24px #c8d8e830, 0 0 60px #c8d8e810;
  border: 1px solid #c8d8e822;
}

@keyframes f1 { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-14px) rotate(1.5deg)} }
@keyframes f2 { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-9px) rotate(-1deg)} }
@keyframes f3 { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-18px) rotate(2deg)} }
@keyframes f4 { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-11px) rotate(-0.5deg)} }
@keyframes f5 { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-16px) rotate(1deg)} }

/* ═══════════════════════════════════
   EXPLORE PAGE
═══════════════════════════════════ */
#explore { overflow: hidden; }
.explore-bg {
  position: absolute; inset: 0;
  transition: background 1s ease;
}

#scope-overlay {
  position: absolute; inset: 0;
  z-index: 10;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
  background: radial-gradient(circle 130px at 50% 50%, transparent 108px, rgba(3,4,10,0.92) 130px);
}
#explore.scope-active:hover #scope-overlay { opacity: 1; }

.explore-keyring {
  position: absolute;
  cursor: pointer;
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.explore-keyring .kr-orb {
  width: 64px; height: 64px; font-size: 26px;
  transition: transform 0.25s, filter 0.25s;
}
.explore-keyring:hover .kr-orb { transform: scale(1.25); filter: brightness(1.8); }
.explore-keyring:hover .kr-img { transform: scale(1.18) !important; filter: brightness(1.22) saturate(0.9) !important; }
.explore-keyring .kr-name { font-size: 7px; opacity: 0.5; }

.world-label {
  position: absolute;
  bottom: 44px; left: 44px;
  z-index: 5;
}
.world-label-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 52px;
  font-weight: 300;
  font-style: italic;
  line-height: 1;
  color: rgba(255,255,255,0.08);
  letter-spacing: 0.03em;
}
.world-label-sub {
  font-size: 9px;
  letter-spacing: 0.3em;
  color: #333;
  text-transform: uppercase;
  margin-top: 6px;
}

/* Detail panel */
#detail-panel {
  position: absolute;
  top: 50%; right: 48px;
  transform: translateY(-50%);
  width: 210px;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}
#detail-panel.open { opacity: 1; pointer-events: all; }
.detail-inner {
  background: rgba(5,6,12,0.94);
  border: 1px solid rgba(255,255,255,0.07);
  padding: 28px 22px 22px;
  backdrop-filter: blur(16px);
}
.detail-close {
  position: absolute;
  top: 10px; right: 14px;
  font-size: 14px; color: #333;
  cursor: pointer; transition: color 0.2s; line-height: 1;
}
.detail-close:hover { color: #777; }
.detail-emoji { font-size: 48px; text-align: center; display: block; margin-bottom: 10px; min-height: 54px; }
.detail-name { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 300; text-align: center; margin-bottom: 3px; }
.detail-en { font-size: 8px; letter-spacing: 0.25em; color: #444; text-align: center; text-transform: uppercase; margin-bottom: 16px; }
.detail-desc { font-size: 10.5px; line-height: 1.9; color: #666; margin-bottom: 22px; }
.btn-collect {
  width: 100%; padding: 11px;
  background: none;
  border: 1px solid rgba(255,255,255,0.12);
  color: #999;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase;
  cursor: pointer; transition: all 0.25s;
}
.btn-collect:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.25); color: #ccc; }
.btn-collect.done { border-color: rgba(255,215,0,0.35); color: #c8a800; }
.btn-collect.done:hover { background: rgba(255,215,0,0.05); }

#similar-strip {
  position: absolute;
  bottom: 44px; right: 48px;
  display: flex; gap: 10px;
  z-index: 20;
  opacity: 0; transition: opacity 0.4s 0.1s;
}
#similar-strip.show { opacity: 1; }
.similar-item {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  cursor: pointer; opacity: 0.45; transition: opacity 0.2s, transform 0.2s;
}
.similar-item:hover { opacity: 1; transform: translateY(-5px); }
.similar-item .kr-orb { width: 46px; height: 46px; font-size: 18px; }
.similar-item .kr-name { font-size: 7px; }

/* ═══════════════════════════════════
   COSMOS INTRO — skip button
═══════════════════════════════════ */
#cosmos-skip {
  position: absolute;
  bottom: 36px; right: 44px;
  z-index: 300;
  font-size: 9px;
  letter-spacing: 0.25em;
  color: #333;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.2s;
  display: none;
}
#cosmos-skip:hover { color: #777; }

/* ═══════════════════════════════════
   COLLECTION PAGE
═══════════════════════════════════ */
#collection {
  background: radial-gradient(ellipse at 50% 50%, #080910 0%, #03040a 100%);
}
.collection-info { position: absolute; top: 80px; left: 44px; z-index: 10; }
.collection-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px; font-weight: 300;
  letter-spacing: 0.35em; color: #333; text-transform: uppercase;
}
.collection-count { font-size: 10px; color: #2a2a2a; margin-top: 5px; letter-spacing: 0.1em; }

.ternary-wrap {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
#ternary-svg { width: min(65vh, 65vw); height: min(65vh, 65vw); overflow: visible; }

#tt {
  position: fixed; z-index: 999;
  pointer-events: none;
  background: rgba(5,6,12,0.96);
  border: 1px solid rgba(255,255,255,0.07);
  padding: 12px 16px;
  backdrop-filter: blur(12px);
  opacity: 0; transition: opacity 0.2s;
  white-space: nowrap;
}
#tt.show { opacity: 1; }
.tt-emoji { font-size: 26px; display: block; margin-bottom: 5px; }
.tt-name { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 300; }
.tt-world { font-size: 8px; letter-spacing: 0.2em; color: #444; text-transform: uppercase; margin-top: 2px; }

#empty-state {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
}
#empty-state p { font-size: 10px; letter-spacing: 0.25em; color: #2a2a2a; text-transform: uppercase; }
#empty-state button {
  margin-top: 4px; padding: 10px 26px;
  background: none; border: 1px solid #222; color: #444;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s;
}
#empty-state button:hover { border-color: #444; color: #777; }
</style>
</head>
<body>

<!-- ═══ ENTRY PAGE ═══ -->
<div id="entry" class="page active">
  <nav class="nav">
    <span class="nav-logo" onclick="goTo('entry')">키링아카이브</span>
    <div class="nav-links">
      <span class="nav-link on" onclick="goTo('entry')">진입</span>
      <span class="nav-link" onclick="goTo('collection')">수집</span>
    </div>
  </nav>
  <div class="floating-field" id="floating-field"></div>
  <div class="entry-hint">— 눈에 드는 키링을 골라보세요 —</div>
</div>

<!-- ═══ EXPLORE PAGE ═══ -->
<div id="explore" class="page">
  <nav class="nav">
    <span class="nav-logo" onclick="goTo('entry')">키링아카이브</span>
    <div class="nav-links">
      <span class="nav-link" onclick="goTo('entry')">진입</span>
      <span class="nav-link" onclick="goTo('collection')">수집</span>
    </div>
  </nav>
  <div class="explore-bg" id="explore-bg"></div>
  <div id="scope-overlay"></div>
  <div id="explore-keyrings"></div>
  <div class="world-label">
    <div class="world-label-name" id="world-label-name"></div>
    <div class="world-label-sub" id="world-label-sub"></div>
  </div>
  <div id="detail-panel">
    <div class="detail-inner">
      <span class="detail-close" onclick="closeDetail()">✕</span>
      <div class="detail-emoji" id="d-emoji"></div>
      <div class="detail-name" id="d-name"></div>
      <div class="detail-en" id="d-en"></div>
      <div class="detail-desc" id="d-desc"></div>
      <button class="btn-collect" id="btn-collect" onclick="toggleCollect()">★ 수집하기</button>
    </div>
  </div>
  <div id="similar-strip"></div>
  <div id="cosmos-skip" onclick="skipIntro()">skip ↗</div>
</div>

<!-- ═══ COLLECTION PAGE ═══ -->
<div id="collection" class="page">
  <nav class="nav">
    <span class="nav-logo" onclick="goTo('entry')">키링아카이브</span>
    <div class="nav-links">
      <span class="nav-link" onclick="goTo('entry')">진입</span>
      <span class="nav-link on">수집</span>
    </div>
  </nav>
  <div class="collection-info">
    <div class="collection-title">My Archive</div>
    <div class="collection-count" id="collection-count"></div>
  </div>
  <div class="ternary-wrap">
    <svg id="ternary-svg" viewBox="0 0 600 600"></svg>
  </div>
  <div id="empty-state" style="display:none">
    <p>아직 수집된 키링이 없어요</p>
    <button onclick="goTo('entry')">탐색 시작하기</button>
  </div>
</div>

<div id="tt">
  <span class="tt-emoji" id="tt-emoji"></span>
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-world" id="tt-world"></div>
</div>

function goTo(page, worldId) {
  // cancel any running intro
  if (introRaf) { cancelAnimationFrame(introRaf); introRaf = null; }
  if (introSkipFn) { introSkipFn = null; }

  document.getElementById(currentPage).classList.remove('active');
  currentPage = page;
  document.getElementById(page).classList.add('active');
  closeDetail();

  if (page === 'entry') renderEntry();
  else if (page === 'explore' && worldId) renderExplore(worldId);
  else if (page === 'collection') renderCollection();
}

function renderEntry() {
  const field = document.getElementById('floating-field');
  field.innerHTML = '';
  const shuffled = [...KEYRINGS].sort(() => Math.random() - 0.5);
  const anims = ['f1','f2','f3','f4','f5'];

  shuffled.forEach((kr, i) => {
    const x = 8 + Math.random() * 78;
    const y = 10 + Math.random() * 72;
    const dur = 4 + Math.random() * 4;
    const delay = Math.random() * -6;
    const anim = anims[i % anims.length];

    const card = document.createElement('div');
    card.className = `kr-card world-${kr.world}`;
    card.style.cssText = `left:${x}%;top:${y}%;animation:${anim} ${dur}s ${delay}s ease-in-out infinite;`;

    // Cosmos keyrings: use product image with screen blend (black bg disappears)
    const orbHtml = (kr.world === 'cosmos' && kr.img)
      ? `<div class="kr-orb" style="background:none;box-shadow:none;border:none;overflow:visible;">
           <img src="${kr.img}"
             onerror="this.parentElement.innerHTML='${kr.emoji}'"
             style="width:74px;height:74px;object-fit:contain;mix-blend-mode:screen;
                    filter:brightness(1.08) saturate(0.88);display:block;">
         </div>`
      : `<div class="kr-orb">${kr.emoji}</div>`;

    card.innerHTML = orbHtml + `<div class="kr-name">${kr.name}</div>`;
    card.onclick = () => goTo('explore', kr.world);
    field.appendChild(card);
  });
}

function renderExplore(worldId) {
  currentWorld = worldId;
  const world = WORLDS[worldId];
  const wKeyrings = KEYRINGS.filter(k => k.world === worldId);

  document.getElementById('explore-bg').style.background = world.bg;
  document.getElementById('world-label-name').textContent = world.name;
  document.getElementById('world-label-sub').textContent = world.sub;
  document.getElementById('explore-keyrings').innerHTML = '';
  document.getElementById('scope-overlay').style.opacity = '0';
  document.getElementById('explore').classList.remove('scope-active');

  if (worldId === 'cosmos') {
    playCosmosIntro(wKeyrings);
  } else {
    renderBrowseKeyrings(wKeyrings, worldId);
  }
}

function renderBrowseKeyrings(wKeyrings, worldId) {
  const world = WORLDS[worldId];
  const container = document.getElementById('explore-keyrings');
  container.innerHTML = '';

  wKeyrings.forEach((kr, i) => {
    const pos = world.grid[i];
    const el = document.createElement('div');
    el.className = `explore-keyring world-${worldId}`;
    el.style.cssText = `left:${pos.x}%;top:${pos.y}%;transform:translate(-50%,-50%);`;

    const imgHtml = (worldId === 'cosmos' && kr.img)
      ? `<div style="
            width:82px;height:82px;
            display:flex;align-items:center;justify-content:center;
          ">
           <img src="${kr.img}" style="
             width:82px;height:82px;
             object-fit:contain;
             mix-blend-mode:screen;
             filter:brightness(1.06) saturate(0.9);
             display:block;
             transition:filter .25s,transform .25s;
           " class="kr-img">
         </div>`
      : `<div class="kr-orb">${kr.emoji}</div>`;

    el.innerHTML = imgHtml + `<div class="kr-name">${kr.name}</div>`;
    el.onclick = (e) => { e.stopPropagation(); openDetail(kr); };
    container.appendChild(el);
  });

  activateTelescope();
}

function activateTelescope() {
  const exploreEl = document.getElementById('explore');
  const overlay = document.getElementById('scope-overlay');
  exploreEl.classList.add('scope-active');
  exploreEl.onmousemove = (e) => {
    overlay.style.background = `radial-gradient(circle 130px at ${e.clientX}px ${e.clientY}px, transparent 108px, rgba(3,4,10,0.92) 130px)`;
  };
}

// ═══════════════════════════════════════
// COSMOS CINEMATIC INTRO
// ═══════════════════════════════════════
//
// Phase timeline (ms):
//   0    → 1800  : ZOOM    — starfield rushes toward viewer
//   1800 → 2400  : REVEAL  — nebula blooms, rings + keyrings fade in
//   2400 → 5600  : ORBIT   — keyrings orbit with depth (3.2 s)
//   5600 → 6800  : SCATTER — rings dissolve, keyrings fly to browse pos
//   6800+         : BROWSE  — canvas gone, telescope active
//

// ── Per-keyring depth in float mode (0=far/small, 1=near/big) ──
const COSMOS_DEPTHS = [0.82, 0.38, 0.90, 0.20, 0.65, 0.52];

// ── helper (global scope so renderCosmosFloat can use it) ──
function _lerp(a, b, t) { return a + (b-a) * Math.min(1, Math.max(0, t)); }

function renderCosmosFloat(wKeyrings) {
  const W = window.innerWidth, H = window.innerHeight;
  const world = WORLDS['cosmos'];
  const container = document.getElementById('explore-keyrings');
  container.innerHTML = '';

  wKeyrings.forEach((kr, i) => {
    const pos  = world.grid[i];
    const d    = COSMOS_DEPTHS[i];
    const sz   = Math.round(_lerp(58, 96, d));
    const op   = _lerp(0.42, 1.0, d);
    const blur = _lerp(1.2, 0, d).toFixed(1);
    const sc   = _lerp(0.82, 1.10, d).toFixed(2);
    const zIdx = Math.round(d * 10);

    const el = document.createElement('div');
    el.className = 'explore-keyring world-cosmos';
    el.dataset.krid  = kr.id;
    el.dataset.depth = d;
    el.dataset.sc    = sc;
    // Normalised base position (-1..+1 from centre) for depth-tilt calc
    el.dataset.bx = ((pos.x - 50) / 50).toFixed(3);
    el.dataset.by = ((pos.y - 50) / 50).toFixed(3);
    // No float animation — static position, parallax only
    el.style.cssText = `
      left:${pos.x}%;top:${pos.y}%;
      transform:translate(-50%,-50%) scale(${sc});
      opacity:${op};
      filter:blur(${blur}px);
      z-index:${zIdx};
      transition:transform 0.5s cubic-bezier(.22,.68,0,1.2),
                 filter 0.5s ease, opacity 0.5s ease;
    `;

    const imgHtml = kr.img
      ? `<div style="width:${sz}px;height:${sz}px;display:flex;align-items:center;justify-content:center;">
           <img src="${kr.img}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
             style="width:${sz}px;height:${sz}px;object-fit:contain;
                    mix-blend-mode:screen;filter:brightness(1.08) saturate(0.88);display:block;">
           <div style="display:none;width:${sz}px;height:${sz}px;border-radius:50%;
                  background:radial-gradient(circle at 36% 34%,rgba(200,220,240,.12),rgba(8,10,22,.9));
                  align-items:center;justify-content:center;font-size:${Math.round(sz*.37)}px;
                  border:1px solid rgba(200,218,232,.18);">${kr.emoji}</div>
         </div>`
      : `<div style="width:${sz}px;height:${sz}px;border-radius:50%;
               background:radial-gradient(circle at 36% 34%,rgba(200,220,240,.12),rgba(8,10,22,.9));
               display:flex;align-items:center;justify-content:center;font-size:${Math.round(sz*.37)}px;
               border:1px solid rgba(200,218,232,.18);">${kr.emoji}</div>`;

    el.innerHTML = imgHtml + `<div class="kr-name">${kr.name}</div>`;
    el.onclick = (e) => { e.stopPropagation(); openDetail(kr); };

    // Hover: float forward — sharper, larger, brighter
    el.addEventListener('mouseenter', () => {
      el.dataset.hovered = '1';
      const baseSc = parseFloat(el.dataset.sc || 1);
      const cur = el.style.transform.match(/calc\(-50% \+ ([^p]+)px\)/g) || [];
      const ox  = cur[0] ? cur[0].match(/-50% \+ ([^p]+)px/)[1] : '0';
      const oy  = cur[1] ? cur[1].match(/-50% \+ ([^p]+)px/)[1] : '0';
      el.style.filter    = 'blur(0px)';
      el.style.opacity   = '1';
      el.style.zIndex    = '30';
      el.style.transform = `translate(calc(-50% + ${ox}px), calc(-50% + ${oy}px)) scale(${(baseSc * 1.18).toFixed(2)})`;
    });
    el.addEventListener('mouseleave', () => {
      delete el.dataset.hovered;
      el.style.zIndex = String(Math.round(parseFloat(el.dataset.depth || 0) * 10));
    });

    container.appendChild(el);
  });

  // Space parallax — mouse tilts the whole scene, depth layers shift at different rates
  const exploreEl = document.getElementById('explore');
  exploreEl.removeEventListener('mousemove', _cosmosParallax);
  exploreEl.addEventListener('mousemove', _cosmosParallax);

  activateTelescope();
}

function _cosmosParallax(e) {
  const W = window.innerWidth, H = window.innerHeight;
  const dx = (e.clientX - W/2) / (W/2);  // -1 to +1
  const dy = (e.clientY - H/2) / (H/2);

  document.querySelectorAll('[data-krid]').forEach(el => {
    if (el.dataset.hovered) return;  // let hover state own the transform
    const baseD = parseFloat(el.dataset.depth || 0);
    const bx    = parseFloat(el.dataset.bx || 0);  // keyring pos, -1..+1
    const by    = parseFloat(el.dataset.by || 0);

    // Tilt: dot product of keyring direction and mouse direction
    // → keyrings the mouse moves "toward" appear closer, opposite side farther
    const tilt  = (bx * dx + by * dy) * 0.32;
    const d     = Math.min(1, Math.max(0, baseD + tilt));

    // Recompute visual depth properties live
    const sc   = _lerp(0.82, 1.10, d).toFixed(2);
    const blur = Math.max(0, _lerp(1.2, 0, d)).toFixed(1);
    const op   = _lerp(0.42, 1.0, d).toFixed(2);

    // Parallax offset — near (high d) moves more
    const px = dx * d * 36;
    const py = dy * d * 24;

    el.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px)) scale(${sc})`;
    el.style.filter    = `blur(${blur}px)`;
    el.style.opacity   = op;
  });
}

function playCosmosIntro(wKeyrings) {
  // ─────────────────────────────────────────────────────────────
  // Phase timeline (ms):
  //   0    → 2800  : ORBIT   — rings + keyrings visible, slow drift
  //   2800 → 4800  : ZOOM    — camera rushes INTO ring center (scale ×4.5)
  //   4800 → 6000  : BURST   — ring expands full-screen then fades
  //   6000 → 7200  : SCATTER — keyrings fly to depth-float positions
  //   7200+         : BROWSE  — renderCosmosFloat activated
  // ─────────────────────────────────────────────────────────────
  const exploreEl = document.getElementById('explore');
  const skipBtn   = document.getElementById('cosmos-skip');
  skipBtn.style.display = 'block';

  const W = window.innerWidth, H = window.innerHeight;
  const CX = W/2, CY = H/2;
  const minDim = Math.min(W, H);
  const FOCAL  = minDim * 0.82;

  const browsePos = WORLDS['cosmos'].grid.map(g => ({
    x:(g.x/100)*W, y:(g.y/100)*H,
  }));

  // ── Canvas ──
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  canvas.style.cssText = 'position:absolute;inset:0;z-index:50;pointer-events:none;';
  exploreEl.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  // ── Stars ──
  function mkStar() {
    const a = Math.random()*Math.PI*2, r = 8+Math.random()*110;
    return { ox:Math.cos(a)*r, oy:Math.sin(a)*r,
             z:150+Math.random()*850, bright:0.3+Math.random()*0.7,
             cold:Math.random()>.72, sparkle:Math.random()>.88 };
  }
  const stars = Array.from({length:320}, mkStar);

  // ── Orbital rings — 3 rings × 2 keyrings ──
  const ORBITS = [
    { rx:minDim*.40, ry:minDim*.108, tiltDeg:-22, krIdx:[0,3] },
    { rx:minDim*.27, ry:minDim*.074, tiltDeg: 26, krIdx:[1,4] },
    { rx:minDim*.17, ry:minDim*.046, tiltDeg: -7, krIdx:[2,5] },
  ];

  const KR_SIZE = 72;
  const krState = wKeyrings.map((kr, i) => {
    const orb  = ORBITS.find(o => o.krIdx.includes(i));
    const slot = orb.krIdx.indexOf(i);
    return { kr, orb,
      angle: (slot/orb.krIdx.length)*Math.PI*2 + Math.random()*.5,
      speed: orb===ORBITS[0] ? 0.0022 : orb===ORBITS[1] ? 0.0034 : 0.0055,
      el: null };
  });

  // ── Keyring DOM ──
  const krWrap = document.createElement('div');
  krWrap.style.cssText = 'position:absolute;inset:0;z-index:51;pointer-events:none;';
  exploreEl.appendChild(krWrap);

  krState.forEach(ks => {
    const el = document.createElement('div');
    el.style.cssText = `position:absolute;display:flex;flex-direction:column;
      align-items:center;gap:4px;transform:translate(-50%,-50%) scale(1);
      opacity:0;left:${CX}px;top:${CY}px;will-change:transform,left,top,opacity;`;
    const imgHtml = ks.kr.img
      ? `<div style="width:${KR_SIZE}px;height:${KR_SIZE}px;display:flex;align-items:center;justify-content:center;">
           <img src="${ks.kr.img}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
             style="width:${KR_SIZE}px;height:${KR_SIZE}px;object-fit:contain;
                    mix-blend-mode:screen;filter:brightness(1.08) saturate(0.88);display:block;">
           <div style="display:none;width:${KR_SIZE}px;height:${KR_SIZE}px;border-radius:50%;
                  background:radial-gradient(circle at 36% 34%,rgba(200,220,240,.12),rgba(8,10,22,.9));
                  align-items:center;justify-content:center;font-size:28px;
                  border:1px solid rgba(200,218,232,.18);">${ks.kr.emoji}</div>
         </div>`
      : `<div style="width:${KR_SIZE}px;height:${KR_SIZE}px;border-radius:50%;
               background:radial-gradient(circle at 36% 34%,rgba(200,220,240,.12),rgba(8,10,22,.9));
               display:flex;align-items:center;justify-content:center;font-size:28px;
               border:1px solid rgba(200,218,232,.18);">${ks.kr.emoji}</div>`;
    el.innerHTML = imgHtml + `<div style="font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:#444;">${ks.kr.name}</div>`;
    krWrap.appendChild(el);
    ks.el = el;
  });

  // ── Math helpers ──
  const lerp = (a,b,t) => a+(b-a)*Math.min(1,Math.max(0,t));
  const eo3  = t => 1-(1-Math.min(1,t))**3;
  const eio  = t => t<.5?4*t*t*t:1-(-2*t+2)**3/2;

  // ── Orbit position (with camera scale) ──
  function orbXY(ks, angle, camSc) {
    const {rx,ry,tiltDeg} = ks.orb;
    const tR = tiltDeg*Math.PI/180;
    const ex = rx*camSc*Math.cos(angle), ey = ry*camSc*Math.sin(angle);
    const x = CX + ex*Math.cos(tR) - ey*Math.sin(tR);
    const y = CY + ex*Math.sin(tR) + ey*Math.cos(tR);
    const depth = (Math.sin(angle)+1)/2;
    return {x, y, depth};
  }

  // ── Saturn-ring drawing ──
  function drawRings(camSc, ringA) {
    const bands = [[0,.40,.9],[-4,.26,.7],[4,.22,.7],[-9,.13,.5],[9,.11,.5],[-15,.06,.4],[15,.05,.4]];
    [...ORBITS].sort((a,b)=>a.tiltDeg-b.tiltDeg).forEach(orb => {
      const tR = orb.tiltDeg*Math.PI/180;
      const sRx = orb.rx*camSc, sRy = orb.ry*camSc;
      bands.forEach(([dr,opF,lw]) => {
        const rxb = sRx + dr*(sRx/minDim*2.2), ryb = sRy + dr*(sRy/minDim*2.2);
        if (rxb<=0||ryb<=0) return;
        ctx.save(); ctx.translate(CX,CY); ctx.rotate(tR);
        ctx.beginPath(); ctx.ellipse(0,0,rxb,ryb,0,Math.PI,Math.PI*2);
        ctx.strokeStyle=`rgba(200,218,238,${ringA*opF*.45})`; ctx.lineWidth=lw; ctx.stroke();
        ctx.beginPath(); ctx.ellipse(0,0,rxb,ryb,0,0,Math.PI);
        ctx.strokeStyle=`rgba(228,240,255,${ringA*opF})`; ctx.lineWidth=lw*1.15; ctx.stroke();
        ctx.restore();
      });
      // Glow halo
      ctx.save(); ctx.translate(CX,CY); ctx.rotate(tR);
      ctx.beginPath(); ctx.ellipse(0,0,sRx,sRy,0,0,Math.PI*2);
      ctx.strokeStyle=`rgba(210,228,250,${ringA*.09})`; ctx.lineWidth=8;
      ctx.shadowBlur=14; ctx.shadowColor=`rgba(200,220,245,${ringA*.14})`; ctx.stroke();
      ctx.restore();
    });
  }

  // Phase timing (total ~4.3s)
  const T_ZOOM    = 1800;  // orbit phase 1.8s
  const T_BURST   = 3000;  // zoom 1.2s
  const T_SCATTER = 3600;  // burst 600ms
  const T_DONE    = 4300;  // scatter 700ms

  let startTime = null;
  let phase    = 'orbit';
  let camSc    = 1.0;
  let orbitMs  = 0;

  function drawFrame(ts) {
    if (!startTime) startTime = ts;
    const t = ts - startTime;

    if (phase==='orbit'  && t>=T_ZOOM)    phase = 'zoom';
    if (phase==='zoom'   && t>=T_BURST)  { phase='burst'; }
    if (phase==='burst'  && t>=T_SCATTER){ phase='scatter'; startScatter(); }
    if (phase==='scatter'&& t>=T_DONE)   { endIntro(); return; }

    // Camera scale — single smooth curve spanning ZOOM+BURST, avoids mid-phase jerk
    if (phase==='zoom' || phase==='burst') {
      const zp = Math.min(1, (t-T_ZOOM) / (T_SCATTER-T_ZOOM));
      camSc = 1.0 + 7.5 * eio(zp);  // 1.0 → 8.5 smooth
    } else if (phase==='scatter') {
      camSc = lerp(8.5, 10.5, eo3((t-T_SCATTER)/(T_DONE-T_SCATTER)));
    }

    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#02030b'; ctx.fillRect(0,0,W,H);

    // Nebula
    const nA = Math.min(0.5, t/2000 * 0.5);
    const ng = ctx.createRadialGradient(CX,CY*.85,0,CX,CY*.85,minDim*.5);
    ng.addColorStop(0,`rgba(12,16,40,${nA})`);
    ng.addColorStop(.5,`rgba(5,8,22,${nA*.5})`);
    ng.addColorStop(1,'rgba(2,3,10,0)');
    ctx.fillStyle=ng; ctx.fillRect(0,0,W,H);

    // Star zoom speed — match single smooth curve with camSc
    let sz = 1.5;
    if (phase==='zoom' || phase==='burst') {
      const zp = Math.min(1, (t-T_ZOOM) / (T_SCATTER-T_ZOOM));
      sz = 1.5 + 30.5 * eio(zp);
    } else if (phase==='scatter') {
      sz = 32;
    } else if (phase==='orbit') {
      sz = 1.5;  // stars still during orbit
    }

    ctx.save();
    stars.forEach(s => {
      s.z -= sz;
      if (s.z<1) { const a=Math.random()*Math.PI*2,r=8+Math.random()*100;
                   s.ox=Math.cos(a)*r; s.oy=Math.sin(a)*r; s.z=700+Math.random()*300; }
      const k=FOCAL/s.z, sx=CX+s.ox*k, sy=CY+s.oy*k;
      if (sx<-12||sx>W+12||sy<-12||sy>H+12) {
        const a=Math.random()*Math.PI*2,r=8+Math.random()*100;
        s.ox=Math.cos(a)*r; s.oy=Math.sin(a)*r; s.z=700+Math.random()*300; return;
      }
      const prx=1-s.z/1000, r=Math.max(.35,prx*2.5), al=s.bright*Math.min(1,prx*1.8);
      const col=s.cold?`rgba(185,215,245,${al})`:`rgba(255,255,255,${al})`;
      ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
      if (s.sparkle&&r>1.1) {
        const len=r*3.5; ctx.strokeStyle=col; ctx.lineWidth=.25; ctx.globalAlpha=al*.5;
        ctx.beginPath(); ctx.moveTo(sx-len,sy); ctx.lineTo(sx+len,sy);
        ctx.moveTo(sx,sy-len); ctx.lineTo(sx,sy+len); ctx.stroke(); ctx.globalAlpha=1;
      }
    });
    ctx.restore();

    // Ring alpha — fades through burst phase, gone by scatter
    let ringA = 1;
    if (phase==='orbit')        ringA = Math.min(1, t/1000);
    else if (phase==='burst')   ringA = Math.max(0, 1 - eo3((t-T_BURST)/(T_SCATTER-T_BURST)));
    else if (phase==='scatter') ringA = 0;

    if (ringA > 0) drawRings(camSc, ringA);

    // Keyring DOM positions
    if (phase==='orbit'||phase==='zoom') {
      // Orbit speed: 2.2× during orbit, decelerates to 0.4× by end of zoom
      const orbitSpeedMul = phase==='orbit'
        ? 1.3
        : lerp(1.3, 0.35, eio((t-T_ZOOM)/(T_BURST-T_ZOOM)));
      orbitMs += 16 * orbitSpeedMul;
      const fadeIn = Math.min(1, t/700);
      const sorted = krState.map(ks => {
        const angle = ks.angle + orbitMs * ks.speed;
        const {x,y,depth} = orbXY(ks, angle, camSc);
        return {ks,x,y,depth};
      }).sort((a,b)=>a.depth-b.depth);
      sorted.forEach(({ks,x,y,depth}) => {
        const sc = lerp(.7,1.0,depth), op = lerp(.38,1.0,depth)*fadeIn;
        ks.el.style.left  = x+'px';
        ks.el.style.top   = y+'px';
        ks.el.style.transform = `translate(-50%,-50%) scale(${sc.toFixed(3)})`;
        ks.el.style.opacity   = op.toFixed(3);
      });
    }

    introRaf = requestAnimationFrame(drawFrame);
  }

  // ── Scatter: depth-based sizes + positions ──
  function startScatter() {
    krState.forEach((ks, i) => {
      const angle = ks.angle + orbitMs * ks.speed;
      const {x,y} = orbXY(ks, angle, camSc);
      ks.el.style.transition='none';
      ks.el.style.left=x+'px'; ks.el.style.top=y+'px';
      ks.el.style.transform='translate(-50%,-50%) scale(1)';
      ks.el.getBoundingClientRect();

      const d = COSMOS_DEPTHS[i];
      const targetSc = _lerp(.82,1.10,d).toFixed(2);
      const targetOp = _lerp(.42,1.0,d).toFixed(2);
      const delay    = i*55;

      ks.el.style.transition = [
        `left 1.1s ${delay}ms cubic-bezier(.2,1,.3,1)`,
        `top  1.1s ${delay}ms cubic-bezier(.2,1,.3,1)`,
        `transform .9s ${delay}ms cubic-bezier(.2,1,.3,1)`,
        `opacity .7s ${delay+80}ms ease`,
      ].join(',');
      ks.el.style.left      = browsePos[i].x+'px';
      ks.el.style.top       = browsePos[i].y+'px';
      ks.el.style.transform = `translate(-50%,-50%) scale(${targetSc})`;
      ks.el.style.opacity   = targetOp;
    });
  }

  // ── End intro → depth float ──
  function endIntro() {
    cancelAnimationFrame(introRaf);
    introRaf = null;
    skipBtn.style.display = 'none';

    canvas.style.transition = 'opacity 0.5s ease';
    canvas.style.opacity = '0';

    setTimeout(() => {
      canvas.remove();
      krWrap.remove();
      renderCosmosFloat(wKeyrings);
      introSkipFn = null;
    }, 500);
  }

  introSkipFn = endIntro;
  introRaf = requestAnimationFrame(drawFrame);
}

function skipIntro() {
  if (introSkipFn) {
    cancelAnimationFrame(introRaf);
    introRaf = null;
    const fn = introSkipFn;
    introSkipFn = null;
    fn();
  }
}

// ═══════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════

function openDetail(kr) {
  selectedKeyring = kr;

  // Image or emoji in detail panel
  const emojiEl = document.getElementById('d-emoji');
  if (kr.img) {
    emojiEl.innerHTML = `<img src="${kr.img}" style="
      width:90px;height:90px;object-fit:contain;
      mix-blend-mode:screen;filter:brightness(1.06) saturate(0.9);
      display:block;margin:0 auto 10px;
    ">`;
  } else {
    emojiEl.textContent = kr.emoji;
  }

  document.getElementById('d-name').textContent = kr.name;
  // Show brand if available, otherwise show English name
  document.getElementById('d-en').textContent = kr.brand ? `${kr.brand} — ${kr.en}` : kr.en;
  document.getElementById('d-desc').textContent = kr.desc;

  // Show/hide product link
  let linkEl = document.getElementById('d-link');
  if (!linkEl) {
    linkEl = document.createElement('a');
    linkEl.id = 'd-link';
    linkEl.target = '_blank';
    linkEl.style.cssText = `
      display:block;text-align:center;margin-top:-6px;margin-bottom:14px;
      font-size:8px;letter-spacing:.22em;text-transform:uppercase;
      color:#383838;text-decoration:none;transition:color .2s;
    `;
    linkEl.onmouseenter = () => linkEl.style.color = '#777';
    linkEl.onmouseleave = () => linkEl.style.color = '#383838';
    document.getElementById('d-desc').after(linkEl);
  }
  if (kr.url) {
    linkEl.href = kr.url;
    linkEl.textContent = '→ 상품 보기';
    linkEl.style.display = 'block';
  } else {
    linkEl.style.display = 'none';
  }

  updateCollectBtn(document.getElementById('btn-collect'), kr.id);
  document.getElementById('detail-panel').classList.add('open');
  renderSimilar(kr);
}

function closeDetail() {
  selectedKeyring = null;
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('similar-strip').classList.remove('show');
}

function updateCollectBtn(btn, id) {
  if (collected.has(id)) {
    btn.textContent = '★ 수집됨'; btn.classList.add('done');
  } else {
    btn.textContent = '★ 수집하기'; btn.classList.remove('done');
  }
}

function toggleCollect() {
  if (!selectedKeyring) return;
  const id = selectedKeyring.id;
  collected.has(id) ? collected.delete(id) : collected.add(id);
  localStorage.setItem('kr-collected', JSON.stringify([...collected]));
  updateCollectBtn(document.getElementById('btn-collect'), id);
}

function renderSimilar(kr) {
  const strip = document.getElementById('similar-strip');
  const others = KEYRINGS.filter(k => k.world === kr.world && k.id !== kr.id);
  strip.innerHTML = others.map(k => {
    const thumb = (k.world === 'cosmos' && k.img)
      ? `<img src="${k.img}" style="width:46px;height:46px;object-fit:contain;mix-blend-mode:screen;filter:brightness(1.06) saturate(0.9);">`
      : `<div class="kr-orb">${k.emoji}</div>`;
    return `<div class="similar-item world-${k.world}"
         onclick="openDetail(KEYRINGS.find(x=>x.id==='${k.id}'))">
      ${thumb}
      <div class="kr-name">${k.name}</div>
    </div>`;
  }).join('');
  setTimeout(() => strip.classList.add('show'), 50);
}

// ═══════════════════════════════════════
// COLLECTION — Ternary Plot
// ═══════════════════════════════════════

const TRI = {
  cosmos:     { x: 300, y:  68 },
  'deep-sea': { x: 110, y: 500 },
  forest:     { x: 490, y: 500 },
};

function ternaryPos(w) {
  const [ds, fo, co] = w, total = ds + fo + co;
  return {
    x: (co/total)*TRI.cosmos.x + (ds/total)*TRI['deep-sea'].x + (fo/total)*TRI.forest.x,
    y: (co/total)*TRI.cosmos.y + (ds/total)*TRI['deep-sea'].y + (fo/total)*TRI.forest.y,
  };
}

function renderCollection() {
  const svg = document.getElementById('ternary-svg');
  const emptyEl = document.getElementById('empty-state');
  const collectedKr = KEYRINGS.filter(k => collected.has(k.id));
  const wColors = { 'deep-sea':'#00d4aa', 'forest':'#6baed6', 'cosmos':'#c8d8e8' };
  const wNames  = { 'deep-sea':'DEEP SEA', 'forest':'FOREST FLOOR', 'cosmos':'COSMOS' };

  svg.style.display = collectedKr.length === 0 ? 'none' : 'block';
  emptyEl.style.display = collectedKr.length === 0 ? 'flex' : 'none';
  document.getElementById('collection-count').textContent =
    collectedKr.length > 0 ? `${collectedKr.length}개 수집됨` : '';

  if (!collectedKr.length) return;

  const A = TRI.cosmos, B = TRI['deep-sea'], C = TRI.forest;

  svg.innerHTML = `
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <polygon points="${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}"
      fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <line x1="${(A.x+B.x)/2}" y1="${(A.y+B.y)/2}" x2="${C.x}" y2="${C.y}"
      stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="${(A.x+C.x)/2}" y1="${(A.y+C.y)/2}" x2="${B.x}" y2="${B.y}"
      stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="${(B.x+C.x)/2}" y1="${(B.y+C.y)/2}" x2="${A.x}" y2="${A.y}"
      stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <circle cx="${A.x}" cy="${A.y}" r="3" fill="#c8d8e8" opacity="0.5"/>
    <circle cx="${B.x}" cy="${B.y}" r="3" fill="#00d4aa" opacity="0.5"/>
    <circle cx="${C.x}" cy="${C.y}" r="3" fill="#6baed6" opacity="0.5"/>
    <text x="${A.x}" y="${A.y-18}" text-anchor="middle" fill="#c8d8e8"
      font-size="9" letter-spacing="3" font-family="Space Grotesk" opacity="0.6">COSMOS</text>
    <text x="${B.x-14}" y="${B.y+22}" text-anchor="middle" fill="#00d4aa"
      font-size="9" letter-spacing="2" font-family="Space Grotesk" opacity="0.6">DEEP SEA</text>
    <text x="${C.x+14}" y="${C.y+22}" text-anchor="middle" fill="#6baed6"
      font-size="9" letter-spacing="2" font-family="Space Grotesk" opacity="0.6">FOREST</text>
    ${collectedKr.map(kr => {
      const p = ternaryPos(kr.w), col = wColors[kr.world];
      return `<g class="kr-dot" data-id="${kr.id}" style="cursor:pointer">
        <circle cx="${p.x}" cy="${p.y}" r="16" fill="${col}" opacity="0.06"/>
        <circle cx="${p.x}" cy="${p.y}" r="5" fill="${col}" opacity="0.85"/>
        <text x="${p.x}" y="${p.y+1}" text-anchor="middle" dominant-baseline="middle"
          font-size="9">${kr.emoji}</text>
      </g>`;
    }).join('')}`;

  const tt = document.getElementById('tt');
  svg.querySelectorAll('.kr-dot').forEach(dot => {
    const kr = KEYRINGS.find(k => k.id === dot.dataset.id);
    dot.addEventListener('mouseenter', () => {
      document.getElementById('tt-emoji').textContent = kr.emoji;
      document.getElementById('tt-name').textContent = kr.name;
      document.getElementById('tt-world').textContent = wNames[kr.world];
      tt.classList.add('show');
    });
    dot.addEventListener('mousemove', e => {
      tt.style.left = (e.clientX + 14) + 'px';
      tt.style.top  = (e.clientY - 10) + 'px';
    });
    dot.addEventListener('mouseleave', () => tt.classList.remove('show'));
  });
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderEntry();
</script>
